    <title>Kinia リンク集</title>
    <meta name="description" content="Kinia（キニア）の公式リンク集。アプリのダウンロード、note記事、公式サイトへのリンクをまとめています。">
    <meta property="og:title" content="Kinia — 家族をそっと見守る位置共有アプリ">
    <meta property="og:description" content="公式リンク集。ダウンロード・note記事・公式サイトはこちらから。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kinia.io/links">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Shippori+Mincho:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fbf6ef;
            --bg-alt: #f4e8d8;
            --card: #ffffff;
            --ink: #2a2218;
            --sub: rgba(42,34,24,0.62);
            --mute: rgba(42,34,24,0.4);
            --accent: #d97a5a;
            --accent2: #b85a3e;
            --sage: #a3b89a;
            --navy: #2c3a5e;
            --line: rgba(42,34,24,0.08);
            --font-head: 'Shippori Mincho', 'Noto Serif JP', serif;
            --font-body: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--ink);
            line-height: 1.85;
            overflow-x: hidden;
            font-size: 17px;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        a { color: var(--accent2); text-decoration: none; }

        .links-page {
            width: 100%;
            max-width: 480px;
            padding: 48px 24px 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .links-icon {
            width: 88px;
            height: 88px;
            border-radius: 22px;
            box-shadow: 0 8px 24px -8px rgba(42,34,24,0.15);
            margin-bottom: 16px;
        }

        .links-name {
            font-family: var(--font-head);
            font-size: 24px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 4px;
        }

        .links-ruby {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--mute);
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .links-bio {
            font-size: 14.5px;
            color: var(--sub);
            text-align: center;
            line-height: 1.8;
            margin-bottom: 36px;
        }

        .links-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 22px;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            text-decoration: none;
            color: var(--ink);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(42,34,24,0.1);
            text-decoration: none;
        }

        .link-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .link-card-icon svg { width: 20px; height: 20px; }

        .link-card-icon.store { background: rgba(44,58,94,0.1); }
        .link-card-icon.store svg { stroke: var(--navy); }
        .link-card-icon.site { background: rgba(217,122,90,0.13); }
        .link-card-icon.site svg { stroke: var(--accent2); }
        .link-card-icon.note { background: rgba(163,184,154,0.2); }
        .link-card-icon.note svg { stroke: #5a7a50; }
        .link-card-icon.instagram { background: rgba(193,53,132,0.1); }
        .link-card-icon.instagram svg { stroke: #c13584; }

        .link-card-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .link-card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--ink);
        }

        .link-card-desc {
            font-size: 12.5px;
            color: var(--mute);
        }

        .link-card-arrow {
            margin-left: auto;
            flex-shrink: 0;
            color: var(--mute);
        }

        .link-card.primary {
            background: var(--navy);
            border-color: var(--navy);
            box-shadow: 0 8px 20px -6px rgba(44,58,94,0.4);
        }
        .link-card.primary:hover {
            background: #1e2c4a;
            box-shadow: 0 10px 28px -6px rgba(44,58,94,0.5);
        }
        .link-card.primary .link-card-title { color: #fff; }
        .link-card.primary .link-card-desc { color: rgba(255,255,255,0.65); }
        .link-card.primary .link-card-icon { background: rgba(255,255,255,0.15); }
        .link-card.primary .link-card-icon svg { stroke: #fff; }
        .link-card.primary .link-card-arrow { color: rgba(255,255,255,0.5); }

        .link-card.disabled {
            opacity: 0.55;
            pointer-events: none;
        }

        .links-section-label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
            margin: 28px 0 8px;
            align-self: flex-start;
        }

        .links-share {
            margin-top: 36px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--mute);
            cursor: pointer;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: var(--card);
            transition: color 0.2s, border-color 0.2s;
        }
        .links-share:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        .links-footer {
            margin-top: 48px;
            font-size: 12px;
            color: var(--mute);
        }

        .share-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--navy);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        .share-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .links-qr {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .links-qr img {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            border: 1px solid var(--line);
        }
        .links-qr span {
            font-size: 11px;
            color: var(--mute);
            font-family: var(--font-mono);
            letter-spacing: 1px;
        }
    </style>
</head>

<div class="share-toast" id="shareToast">リンクをコピーしました</div>

<script>
function shareKinia() {
    var data = {
        title: 'Kinia（キニア）',
        text: '家族をそっと見守る位置共有アプリ',
        url: 'https://kinia.io/links'
    };
    if (navigator.share) {
        navigator.share(data);
    } else {
        navigator.clipboard.writeText(data.url).then(function() {
            var toast = document.getElementById('shareToast');
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2000);
        });
    }
}
</script>
