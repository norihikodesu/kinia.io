<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinia Mockup — メイン画面（グループ作成）</title>
<style>
:root {
    --bg: #12121F;
    --surface: #1E1E30;
    --surface-container: #282540;
    --surface-container-high: #32304E;
    --on-surface: #E8E4F0;
    --on-surface-variant: #B0AAC2;
    --primary: #7C8EF2;
    --on-primary: #FFFFFF;
    --primary-container: #2A3070;
    --secondary: #FF8A65;
    --tertiary: #4DB6AC;
    --error: #F2726A;
    --on-error: #FFFFFF;
    --outline: #524D6B;
    --outline-variant: #3D3855;
    --nav-bg: #0E0E1A;
    --status-online: #4CAF50;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #2a2a3a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
}
.screen-title {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 8px;
    text-align: center;
}
.phone {
    width: 360px;
    height: 780px;
    background: var(--bg);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    position: relative;
    border: 3px solid #444;
}
.status-bar {
    height: 28px;
    background: var(--nav-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    font-size: 12px;
    color: var(--on-surface-variant);
    flex-shrink: 0;
}
.screen-body {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}
.bottom-nav {
    height: 56px;
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-shrink: 0;
    border-top: 1px solid var(--outline-variant);
}
.bottom-nav .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    color: var(--on-surface-variant);
    cursor: pointer;
}
.bottom-nav .nav-item.active {
    color: var(--primary);
}
.bottom-nav .nav-item .icon {
    font-size: 20px;
}

/* 共通コンポーネント */
.toolbar {
    height: 56px;
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    padding: 0 16px;
    flex-shrink: 0;
}
.toolbar .title {
    color: var(--on-surface);
    font-size: 18px;
    font-weight: bold;
}
.toolbar .back {
    color: var(--on-surface);
    font-size: 20px;
    margin-right: 16px;
    cursor: pointer;
}
.btn-primary {
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: 8px;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.btn-secondary {
    background: var(--surface-container-high);
    color: var(--on-surface-variant);
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.btn-tertiary {
    background: var(--tertiary);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.input-field {
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--primary);
    color: var(--on-surface);
    font-size: 16px;
    padding: 8px 4px;
    width: 100%;
    outline: none;
}
.input-field::placeholder {
    color: var(--outline);
}
.input-label {
    color: var(--on-surface-variant);
    font-size: 13px;
    margin-bottom: 4px;
}
.section-title {
    color: var(--primary);
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 12px;
}
.divider {
    height: 1px;
    background: var(--outline);
    opacity: 0.3;
    margin: 20px 0;
}
.hint-box {
    background: var(--surface-container);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--on-surface-variant);
    line-height: 1.6;
}

</style>
</head>
<body>
<div class="screen-title">メイン画面（グループ作成）</div>
<div class="phone">

        <div class="status-bar">
            <span>12:34</span>
            <span>🔋 85%</span>
        </div>
<div class="screen-body">

    <div style="padding:24px;">
        <div style="text-align:center; margin-bottom:4px;">
            <span style="font-size:28px; font-weight:bold; color:var(--primary);">
                Kinia
            </span>
        </div>
        <div style="text-align:center; font-size:15px; color:var(--on-surface-variant); margin-bottom:8px;">
            家族の位置情報を安全に共有
        </div>
        <div style="text-align:center; font-size:15px; color:var(--on-surface-variant); margin-bottom:24px;">
            ○ 停止中
        </div>

        <!-- 招待コードセクション（折りたたみ状態） -->
        <div style="color:var(--on-surface-variant); font-size:14px; padding:8px 0; margin-bottom:4px; opacity:0.6;">
            ▶ 招待コードでグループに参加
        </div>

        <div class="divider"></div>

        <!-- 新規グループ作成（展開状態） -->
        <div style="color:var(--on-surface-variant); font-size:14px; padding:8px 0; margin-bottom:12px;">
            ▼ 新規グループを作成する
        </div>
        <div class="input-label">グループ名（合言葉・3文字以上）</div>
        <div style="display:flex; gap:8px; align-items:flex-end; margin-bottom:12px;">
            <input class="input-field" placeholder="例: yamada2026" style="flex:1;">
            <button style="
                background:var(--surface-container-high);
                color:var(--primary);
                border:none;
                border-radius:6px;
                padding:8px 10px;
                font-size:12px;
                white-space:nowrap;
                cursor:pointer;
            ">自動生成</button>
        </div>
        <button class="btn-tertiary">グループを作成して開始</button>

        <div class="hint-box" style="margin-top:16px;">
            💡 合言葉は最初に1回入力するだけ。ログインはGoogleアカウントで行います。
        </div>
    </div>
</div>

</div>
</body>
</html>
