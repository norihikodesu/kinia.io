<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinia Mockup — マップ画面</title>
<style>
:root {
    --bg: #12121F;
    --surface: #1E1E30;
    --surface-container: #282540;
    --surface-container-high: #32304E;
    --on-surface: #E8E4F0;
    --on-surface-variant: #B0AAC2;
    --primary: #7C8EF2;
    --on-primary: #FFFFFF;
    --primary-container: #2A3070;
    --secondary: #FF8A65;
    --tertiary: #4DB6AC;
    --error: #F2726A;
    --on-error: #FFFFFF;
    --outline: #524D6B;
    --outline-variant: #3D3855;
    --nav-bg: #0E0E1A;
    --status-online: #4CAF50;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #2a2a3a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
}
.screen-title {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 8px;
    text-align: center;
}
.phone {
    width: 360px;
    height: 780px;
    background: var(--bg);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    position: relative;
    border: 3px solid #444;
}
.status-bar {
    height: 28px;
    background: var(--nav-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    font-size: 12px;
    color: var(--on-surface-variant);
    flex-shrink: 0;
}
.screen-body {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}
.bottom-nav {
    height: 56px;
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-shrink: 0;
    border-top: 1px solid var(--outline-variant);
}
.bottom-nav .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    color: var(--on-surface-variant);
    cursor: pointer;
}
.bottom-nav .nav-item.active {
    color: var(--primary);
}
.bottom-nav .nav-item .icon {
    font-size: 20px;
}

/* 共通コンポーネント */
.toolbar {
    height: 56px;
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    padding: 0 16px;
    flex-shrink: 0;
}
.toolbar .title {
    color: var(--on-surface);
    font-size: 18px;
    font-weight: bold;
}
.toolbar .back {
    color: var(--on-surface);
    font-size: 20px;
    margin-right: 16px;
    cursor: pointer;
}
.btn-primary {
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: 8px;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.btn-secondary {
    background: var(--surface-container-high);
    color: var(--on-surface-variant);
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.btn-tertiary {
    background: var(--tertiary);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.input-field {
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--primary);
    color: var(--on-surface);
    font-size: 16px;
    padding: 8px 4px;
    width: 100%;
    outline: none;
}
.input-field::placeholder {
    color: var(--outline);
}
.input-label {
    color: var(--on-surface-variant);
    font-size: 13px;
    margin-bottom: 4px;
}
.section-title {
    color: var(--primary);
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 12px;
}
.divider {
    height: 1px;
    background: var(--outline);
    opacity: 0.3;
    margin: 20px 0;
}
.hint-box {
    background: var(--surface-container);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--on-surface-variant);
    line-height: 1.6;
}

</style>
</head>
<body>
<div class="screen-title">マップ画面</div>
<div class="phone">

        <div class="status-bar">
            <span>12:34</span>
            <span>🔋 85%</span>
        </div>
<div class="screen-body">

    <!-- ツールバー -->
    <div class="toolbar">
        <span class="title">現在地</span>
        <span style="margin-left:auto; color:var(--on-surface-variant); font-size:18px; cursor:pointer;">⋮</span>
    </div>

    <!-- ステータスコメント欄 -->
    <div style="
        background:var(--nav-bg);
        display:flex;
        align-items:center;
        padding:4px 12px;
        gap:6px;
    ">
        <span style="font-size:17px;">💬</span>
        <span style="color:var(--outline); font-size:15px; flex:1;">20文字のコメント</span>
        <button style="
            background:var(--primary);
            color:var(--on-primary);
            border:none;
            border-radius:6px;
            padding:6px 12px;
            font-size:13px;
        ">保存</button>
    </div>

    <!-- 地図エリア -->
    <div style="
        flex:1;
        background: #1a1e24;
        position:relative;
        overflow:hidden;
    ">
        
    <svg style="position:absolute; inset:0; width:100%; height:100%;"
         viewBox="0 0 360 500" preserveAspectRatio="xMidYMid slice">
      <!-- 地面（ダーク） -->
      <rect width="360" height="500" fill="#1a1e24"/>

      <!-- ブロック（建物エリア） -->
      <rect x="10" y="10" width="70" height="55" rx="2" fill="#22272e"/>
      <rect x="10" y="75" width="70" height="80" rx="2" fill="#22272e"/>
      <rect x="10" y="165" width="70" height="50" rx="2" fill="#22272e"/>
      <rect x="10" y="225" width="70" height="90" rx="2" fill="#22272e"/>
      <rect x="10" y="330" width="70" height="60" rx="2" fill="#22272e"/>
      <rect x="10" y="400" width="70" height="90" rx="2" fill="#22272e"/>

      <rect x="95" y="10" width="60" height="55" rx="2" fill="#22272e"/>
      <rect x="95" y="75" width="60" height="80" rx="2" fill="#22272e"/>
      <rect x="95" y="165" width="60" height="50" rx="2" fill="#22272e"/>
      <rect x="95" y="225" width="60" height="90" rx="2" fill="#22272e"/>
      <rect x="95" y="330" width="60" height="60" rx="2" fill="#22272e"/>
      <rect x="95" y="400" width="60" height="90" rx="2" fill="#22272e"/>

      <rect x="170" y="10" width="80" height="90" rx="2" fill="#22272e"/>
      <rect x="170" y="115" width="80" height="45" rx="2" fill="#22272e"/>
      <rect x="170" y="172" width="80" height="60" rx="2" fill="#22272e"/>
      <rect x="170" y="245" width="38" height="70" rx="2" fill="#22272e"/>
      <rect x="212" y="245" width="38" height="70" rx="2" fill="#22272e"/>
      <rect x="170" y="330" width="80" height="60" rx="2" fill="#22272e"/>
      <rect x="170" y="400" width="80" height="90" rx="2" fill="#22272e"/>

      <rect x="265" y="10" width="85" height="55" rx="2" fill="#22272e"/>
      <rect x="265" y="75" width="40" height="80" rx="2" fill="#22272e"/>
      <rect x="310" y="75" width="40" height="80" rx="2" fill="#22272e"/>
      <rect x="265" y="165" width="85" height="50" rx="2" fill="#22272e"/>
      <rect x="265" y="225" width="85" height="90" rx="2" fill="#22272e"/>
      <rect x="265" y="330" width="85" height="60" rx="2" fill="#22272e"/>
      <rect x="265" y="400" width="85" height="90" rx="2" fill="#22272e"/>

      <!-- 公園（緑エリア） -->
      <rect x="95" y="330" width="60" height="60" rx="4" fill="#1c2e1c"/>
      <circle cx="110" cy="350" r="6" fill="#253525" opacity="0.8"/>
      <circle cx="130" cy="360" r="8" fill="#253525" opacity="0.7"/>
      <circle cx="118" cy="372" r="5" fill="#253525" opacity="0.9"/>

      <!-- 川（水色ライン） -->
      <path d="M 0,240 Q 60,230 120,248 Q 180,260 240,242 Q 300,228 360,235"
            stroke="#1a3040" stroke-width="12" fill="none"/>
      <path d="M 0,240 Q 60,230 120,248 Q 180,260 240,242 Q 300,228 360,235"
            stroke="#1e3a4d" stroke-width="6" fill="none"/>

      <!-- 幹線道路 -->
      <line x1="85" y1="0" x2="85" y2="500" stroke="#2a3038" stroke-width="8"/>
      <line x1="160" y1="0" x2="160" y2="500" stroke="#2a3038" stroke-width="8"/>
      <line x1="258" y1="0" x2="258" y2="500" stroke="#2a3038" stroke-width="8"/>

      <line x1="0" y1="67" x2="360" y2="67" stroke="#2a3038" stroke-width="6"/>
      <line x1="0" y1="160" x2="360" y2="160" stroke="#2a3038" stroke-width="6"/>
      <line x1="0" y1="320" x2="360" y2="320" stroke="#2a3038" stroke-width="8"/>
      <line x1="0" y1="395" x2="360" y2="395" stroke="#2a3038" stroke-width="6"/>

      <!-- 道路センターライン（黄色がかった薄線） -->
      <line x1="85" y1="0" x2="85" y2="500" stroke="#3a3a2a" stroke-width="1" stroke-dasharray="8,6"/>
      <line x1="160" y1="0" x2="160" y2="500" stroke="#3a3a2a" stroke-width="1" stroke-dasharray="8,6"/>
      <line x1="258" y1="0" x2="258" y2="500" stroke="#3a3a2a" stroke-width="1" stroke-dasharray="8,6"/>
      <line x1="0" y1="320" x2="360" y2="320" stroke="#3a3a2a" stroke-width="1" stroke-dasharray="8,6"/>

      <!-- 細い路地 -->
      <line x1="45" y1="0" x2="45" y2="500" stroke="#262c34" stroke-width="3"/>
      <line x1="125" y1="0" x2="125" y2="500" stroke="#262c34" stroke-width="3"/>
      <line x1="210" y1="0" x2="210" y2="500" stroke="#262c34" stroke-width="3"/>
      <line x1="305" y1="0" x2="305" y2="500" stroke="#262c34" stroke-width="3"/>

      <line x1="0" y1="110" x2="360" y2="110" stroke="#262c34" stroke-width="3"/>
      <line x1="0" y1="220" x2="360" y2="220" stroke="#262c34" stroke-width="3"/>
      <line x1="0" y1="440" x2="360" y2="440" stroke="#262c34" stroke-width="3"/>

      <!-- 地名ラベル -->
      <text x="30" y="50" font-size="9" fill="#4a5568" font-family="sans-serif">丸の内</text>
      <text x="180" y="145" font-size="9" fill="#4a5568" font-family="sans-serif">有楽町</text>
      <text x="275" y="50" font-size="9" fill="#4a5568" font-family="sans-serif">日本橋</text>
      <text x="100" y="360" font-size="8" fill="#3a5a3a" font-family="sans-serif">日比谷公園</text>
      <text x="100" y="252" font-size="8" fill="#3a5a6a" font-family="sans-serif">外堀</text>

      <!-- 駅マーク -->
      <rect x="196" y="94" width="28" height="14" rx="3" fill="#3a3a50"/>
      <text x="200" y="104" font-size="8" fill="#7a8aaa" font-family="sans-serif" font-weight="bold">東京</text>
    </svg>

        <!-- メンバーマーカー 1: パパ（移動中） -->
        <div style="
            position:absolute;
            top:160px; left:140px;
        ">
            <div style="
                background:var(--surface-container);
                border-radius:8px;
                padding:6px 10px;
                font-size:12px;
                color:var(--on-surface);
                white-space:nowrap;
                box-shadow:0 2px 8px rgba(0,0,0,0.4);
                margin-bottom:4px;
            ">
                <b>パパ</b> 🚶<br>
                <span style="color:var(--on-surface-variant); font-size:11px;">5分前 ・ 東京駅付近</span>
            </div>
            <div style="
                width:36px; height:36px;
                background:var(--primary);
                border-radius:50%;
                display:flex; align-items:center; justify-content:center;
                font-size:16px; font-weight:bold; color:var(--on-primary);
                margin:0 auto;
                box-shadow:0 2px 6px rgba(0,0,0,0.4);
            ">パ</div>
        </div>

        <!-- メンバーマーカー 2: ママ（静止中） -->
        <div style="
            position:absolute;
            top:300px; left:220px;
        ">
            <div style="
                background:var(--surface-container);
                border-radius:8px;
                padding:6px 10px;
                font-size:12px;
                color:var(--on-surface);
                white-space:nowrap;
                box-shadow:0 2px 8px rgba(0,0,0,0.4);
                margin-bottom:4px;
            ">
                <b>ママ</b> 🧍<br>
                <span style="color:var(--on-surface-variant); font-size:11px;">2分前 ・ 自宅</span>
            </div>
            <div style="
                width:36px; height:36px;
                background:#E91E63;
                border-radius:50%;
                display:flex; align-items:center; justify-content:center;
                font-size:16px; font-weight:bold; color:white;
                margin:0 auto;
                box-shadow:0 2px 6px rgba(0,0,0,0.4);
            ">マ</div>
        </div>

        <!-- ジオフェンス円（自宅） -->
        <div style="
            position:absolute;
            top:280px; left:200px;
            width:120px; height:120px;
            border:2px solid var(--primary);
            border-radius:50%;
            opacity:0.3;
            background:rgba(124,142,242,0.1);
        "></div>

        <!-- FABボタン（位置更新） -->
        <div style="
            position:absolute;
            top:8px; right:8px;
            width:40px; height:40px;
            background:var(--surface-container-high);
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 2px 6px rgba(0,0,0,0.4);
            cursor:pointer;
        ">
            <span style="color:var(--primary); font-size:18px;">🔄</span>
        </div>

        <!-- 現在地ボタン -->
        <div style="
            position:absolute;
            bottom:8px; right:12px;
            width:40px; height:40px;
            background:var(--primary-container);
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 2px 6px rgba(0,0,0,0.4);
            cursor:pointer;
        ">
            <span style="color:var(--primary); font-size:18px;">◎</span>
        </div>
    </div>
</div>
<div class="bottom-nav">
  <div class="nav-item active"><span class="icon">🗺️</span>現在地</div>
  <div class="nav-item"><span class="icon">📊</span>移動履歴</div>
  <div class="nav-item"><span class="icon">🔔</span>通知エリア</div>
  <div class="nav-item"><span class="icon">👥</span>メンバー</div>
  <div class="nav-item"><span class="icon">💬</span>メッセージ</div>
</div>
</div>
</body>
</html>
