<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinia Mockup — セットアップ完了</title>
<style>
:root {
    --bg: #12121F;
    --surface: #1E1E30;
    --surface-container: #282540;
    --surface-container-high: #32304E;
    --on-surface: #E8E4F0;
    --on-surface-variant: #B0AAC2;
    --primary: #7C8EF2;
    --on-primary: #FFFFFF;
    --primary-container: #2A3070;
    --secondary: #FF8A65;
    --tertiary: #4DB6AC;
    --error: #F2726A;
    --on-error: #FFFFFF;
    --outline: #524D6B;
    --outline-variant: #3D3855;
    --nav-bg: #0E0E1A;
    --status-online: #4CAF50;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #2a2a3a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
}
.screen-title {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 8px;
    text-align: center;
}
.phone {
    width: 360px;
    height: 780px;
    background: var(--bg);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    position: relative;
    border: 3px solid #444;
}
.status-bar {
    height: 28px;
    background: var(--nav-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    font-size: 12px;
    color: var(--on-surface-variant);
    flex-shrink: 0;
}
.screen-body {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}
.bottom-nav {
    height: 56px;
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-shrink: 0;
    border-top: 1px solid var(--outline-variant);
}
.bottom-nav .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    color: var(--on-surface-variant);
    cursor: pointer;
}
.bottom-nav .nav-item.active {
    color: var(--primary);
}
.bottom-nav .nav-item .icon {
    font-size: 20px;
}

/* 共通コンポーネント */
.toolbar {
    height: 56px;
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    padding: 0 16px;
    flex-shrink: 0;
}
.toolbar .title {
    color: var(--on-surface);
    font-size: 18px;
    font-weight: bold;
}
.toolbar .back {
    color: var(--on-surface);
    font-size: 20px;
    margin-right: 16px;
    cursor: pointer;
}
.btn-primary {
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: 8px;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.btn-secondary {
    background: var(--surface-container-high);
    color: var(--on-surface-variant);
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.btn-tertiary {
    background: var(--tertiary);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.input-field {
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--primary);
    color: var(--on-surface);
    font-size: 16px;
    padding: 8px 4px;
    width: 100%;
    outline: none;
}
.input-field::placeholder {
    color: var(--outline);
}
.input-label {
    color: var(--on-surface-variant);
    font-size: 13px;
    margin-bottom: 4px;
}
.section-title {
    color: var(--primary);
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 12px;
}
.divider {
    height: 1px;
    background: var(--outline);
    opacity: 0.3;
    margin: 20px 0;
}
.hint-box {
    background: var(--surface-container);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--on-surface-variant);
    line-height: 1.6;
}

</style>
</head>
<body>
<div class="screen-title">セットアップ完了</div>
<div class="phone">

        <div class="status-bar">
            <span>12:34</span>
            <span>🔋 85%</span>
        </div>
<div class="screen-body">

    <div style="text-align:center; padding:24px 0 8px; color:var(--primary); font-size:17px; letter-spacing:6px;">
        ● ● ● ● ● ●
    </div>
    <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px;">
        <div style="font-size:64px; margin-bottom:24px;">🎉</div>
        <div style="font-size:23px; font-weight:bold; color:var(--on-surface); margin-bottom:24px;">
            セットアップ完了
        </div>

        <div style="
            background:var(--surface-container);
            border-radius:12px;
            padding:16px;
            width:100%;
            margin-bottom:16px;
        ">
            <div style="font-size:14px; color:var(--on-surface); margin-bottom:6px;">
                ✅ 位置情報 — 許可済み
            </div>
            <div style="font-size:14px; color:var(--on-surface); margin-bottom:6px;">
                ✅ バックグラウンド — 許可済み
            </div>
            <div style="font-size:14px; color:var(--on-surface); margin-bottom:6px;">
                ✅ 活動認識 — 許可済み
            </div>
            <div style="font-size:14px; color:var(--on-surface); margin-bottom:6px;">
                ✅ 通知 — 許可済み
            </div>
            <div style="font-size:14px; color:var(--on-surface); margin-bottom:6px;">
                ✅ 省電力除外 — 許可済み
            </div>
            <div style="font-size:14px; color:var(--on-surface);">
                ✅ 全画面通知 — 許可済み
            </div>
        </div>

        <div style="font-size:14px; color:var(--on-surface-variant); text-align:center; margin-bottom:32px;">
            未許可の項目はあとから設定画面で変更できます
        </div>

        <button class="btn-primary" style="width:240px;">はじめる</button>
    </div>
</div>

</div>
</body>
</html>
