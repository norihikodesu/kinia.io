<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinia Mockup — グループ管理（招待コード）</title>
<style>
:root {
    --bg: #12121F;
    --surface: #1E1E30;
    --surface-container: #282540;
    --surface-container-high: #32304E;
    --on-surface: #E8E4F0;
    --on-surface-variant: #B0AAC2;
    --primary: #7C8EF2;
    --on-primary: #FFFFFF;
    --primary-container: #2A3070;
    --secondary: #FF8A65;
    --tertiary: #4DB6AC;
    --error: #F2726A;
    --on-error: #FFFFFF;
    --outline: #524D6B;
    --outline-variant: #3D3855;
    --nav-bg: #0E0E1A;
    --status-online: #4CAF50;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #2a2a3a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
}
.screen-title {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 8px;
    text-align: center;
}
.phone {
    width: 360px;
    height: 780px;
    background: var(--bg);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    position: relative;
    border: 3px solid #444;
}
.status-bar {
    height: 28px;
    background: var(--nav-bg);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px;
    font-size: 12px;
    color: var(--on-surface-variant);
    flex-shrink: 0;
}
.screen-body {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}
.bottom-nav {
    height: 56px;
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    justify-content: space-around;
    flex-shrink: 0;
    border-top: 1px solid var(--outline-variant);
}
.bottom-nav .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    color: var(--on-surface-variant);
    cursor: pointer;
}
.bottom-nav .nav-item.active {
    color: var(--primary);
}
.bottom-nav .nav-item .icon {
    font-size: 20px;
}

/* 共通コンポーネント */
.toolbar {
    height: 56px;
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    padding: 0 16px;
    flex-shrink: 0;
}
.toolbar .title {
    color: var(--on-surface);
    font-size: 18px;
    font-weight: bold;
}
.toolbar .back {
    color: var(--on-surface);
    font-size: 20px;
    margin-right: 16px;
    cursor: pointer;
}
.btn-primary {
    background: var(--primary);
    color: var(--on-primary);
    border: none;
    border-radius: 8px;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.btn-secondary {
    background: var(--surface-container-high);
    color: var(--on-surface-variant);
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.btn-tertiary {
    background: var(--tertiary);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-align: center;
}
.input-field {
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--primary);
    color: var(--on-surface);
    font-size: 16px;
    padding: 8px 4px;
    width: 100%;
    outline: none;
}
.input-field::placeholder {
    color: var(--outline);
}
.input-label {
    color: var(--on-surface-variant);
    font-size: 13px;
    margin-bottom: 4px;
}
.section-title {
    color: var(--primary);
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 12px;
}
.divider {
    height: 1px;
    background: var(--outline);
    opacity: 0.3;
    margin: 20px 0;
}
.hint-box {
    background: var(--surface-container);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--on-surface-variant);
    line-height: 1.6;
}

</style>
</head>
<body>
<div class="screen-title">グループ管理（招待コード）</div>
<div class="phone">

        <div class="status-bar">
            <span>12:34</span>
            <span>🔋 85%</span>
        </div>
<div class="screen-body">

    <div class="toolbar">
        <span class="back">←</span>
        <span class="title">グループ管理</span>
    </div>
    <div style="padding:16px;">

        <!-- セクション: 参加中のグループ -->
        <div style="font-size:12px; color:var(--primary); letter-spacing:2px; margin-bottom:4px;">参加中のグループ</div>
        <div style="background:var(--surface); border:1px solid var(--outline-variant); border-radius:12px; padding:16px; margin-bottom:16px;">

            <!-- グループ名 -->
            <div style="font-size:12px; color:var(--on-surface-variant); margin-bottom:2px;">グループ名</div>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                <span style="font-size:17px; font-weight:bold; color:var(--on-surface);">やま***だ家</span>
                <button style="background:var(--surface-container-high); color:var(--on-surface); border:none; border-radius:16px; padding:4px 12px; font-size:13px;">表示</button>
            </div>

            <div style="height:1px; background:var(--outline-variant); margin:12px 0;"></div>

            <!-- 表示名 -->
            <div style="font-size:12px; color:var(--on-surface-variant); margin-bottom:2px;">あなたの表示名</div>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                <span style="font-size:17px; font-weight:bold; color:var(--on-surface);">パパ</span>
                <button style="background:var(--primary); color:white; border:none; border-radius:16px; padding:4px 12px; font-size:13px;">変更</button>
            </div>

            <div style="height:1px; background:var(--outline-variant); margin:12px 0;"></div>

            <!-- 招待コード -->
            <div style="font-size:13px; color:var(--on-surface-variant); margin-bottom:8px;">同じ招待コードで家族全員を招待できます。72時間有効です。</div>
            <button style="background:var(--primary); color:white; border:none; border-radius:8px; padding:12px; font-size:15px; width:100%; cursor:pointer;">招待コードを発行</button>
        </div>

        <!-- セクション: メンバー -->
        <div style="font-size:12px; color:var(--primary); letter-spacing:2px; margin-bottom:4px;">メンバー</div>
        <div style="background:var(--surface); border:1px solid var(--outline-variant); border-radius:12px; padding:12px; margin-bottom:16px;">
            <div style="display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--outline-variant);">
                <span style="flex:1; font-size:15px; color:var(--on-surface);">パパ [管理者] (自分)</span>
                <span style="color:var(--on-surface-variant); font-size:13px;">12:30</span>
                <span style="margin-left:8px; color:var(--on-surface-variant);">⋮</span>
            </div>
            <div style="display:flex; align-items:center; padding:8px 0; border-bottom:1px solid var(--outline-variant);">
                <span style="flex:1; font-size:15px; color:var(--on-surface);">ママ</span>
                <span style="color:var(--on-surface-variant); font-size:13px;">12:25</span>
                <span style="margin-left:8px; color:var(--on-surface-variant);">⋮</span>
            </div>
            <div style="display:flex; align-items:center; padding:8px 0;">
                <span style="flex:1; font-size:15px; color:var(--on-surface);">太郎</span>
                <span style="color:var(--on-surface-variant); font-size:13px;">11:50</span>
                <span style="margin-left:8px; color:var(--on-surface-variant);">⋮</span>
            </div>
        </div>

        <!-- セクション: アカウント -->
        <div style="font-size:12px; color:var(--primary); letter-spacing:2px; margin-bottom:4px;">アカウント</div>
        <div style="background:var(--surface); border:1px solid var(--outline-variant); border-radius:12px; padding:16px; margin-bottom:16px;">
            <div style="font-size:14px; color:var(--on-surface-variant); margin-bottom:8px;">ログイン中: example@gmail.com</div>
            <button style="background:var(--surface-container-high); color:var(--on-surface); border:none; border-radius:8px; padding:12px; font-size:15px; width:100%; margin-bottom:12px;">ログアウト</button>
            <div style="height:1px; background:var(--outline-variant); margin:12px 0;"></div>
            <div style="font-size:13px; color:var(--on-surface-variant); margin-bottom:8px;">アカウントとすべてのデータを完全に削除します。この操作は元に戻せません。</div>
            <button style="background:var(--error); color:var(--on-error); border:none; border-radius:8px; padding:12px; font-size:15px; width:100%;">アカウントを削除</button>
        </div>

        <!-- セクション: アプリ情報 -->
        <div style="font-size:12px; color:var(--primary); letter-spacing:2px; margin-bottom:4px;">アプリ情報</div>
        <div style="background:var(--surface); border:1px solid var(--outline-variant); border-radius:12px; padding:16px;">
            <span style="font-size:15px; color:var(--on-surface-variant);">バージョン: 3.3.0 (91)</span>
        </div>
    </div>
</div>

</div>
</body>
</html>
