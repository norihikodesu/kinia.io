<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #1a1a2a;
    color: #ddd;
    padding: 24px;
}
h1 {
    text-align: center;
    color: #7C8EF2;

}
.subtitle {
    text-align: center;
    color: #888;

}
.grid {

    gap: 24px;
    justify-content: center;
}
.preview-item {
    width: 198px;
}
.preview-item a {
    text-decoration: none;
    display: block;
}
.iframe-wrapper {
    width: 198px;
    height: 387px;
    overflow: hidden;
    border-radius: 16px;
    border: 2px solid #444;
    position: relative;
}
.preview-frame {
    width: 440px;
    height: 860px;
    border: none;
    transform: scale(0.45);
    transform-origin: top left;
    pointer-events: none;
}
.preview-label {
    text-align: center;
    margin-top: 8px;
    font-size: 13px;
    color: #aaa;
}
.preview-item:hover .preview-label {
    color: #7C8EF2;
}
.preview-item:hover .iframe-wrapper {
    border-color: #7C8EF2;
}
.note {
    text-align: center;
    color: #666;
    margin-top: 32px;
    font-size: 13px;
}
