<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinia — 家族の安心を見守るアプリ</title>
    <style>
        :root {
            --bg: #12121F;
            --surface: #1E1E30;
            --text: #E8E4F0;
            --text-sub: #B0AAC2;
            --primary: #7C8EF2;
            --border: #3D3855;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
        }

        .logo { font-size: 3rem; margin-bottom: 8px; }
        h1 { font-size: 2rem; color: var(--primary); margin-bottom: 8px; }
        .tagline { font-size: 1.1rem; color: var(--text-sub); margin-bottom: 40px; }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .links a {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 10px 24px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--surface);
            transition: background 0.2s;
            min-width: 240px;
        }

        .links a:hover { background: var(--border); }

        .contact {
            margin-top: 48px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .contact a { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️</div>
        <h1>Kinia</h1>
        <p class="tagline">家族の安心を、そっと見守る</p>

        <div class="links">
            <a href="/privacy.html">プライバシーポリシー / Privacy Policy</a>
            <a href="/delete-account.html">アカウント削除 / Delete Account</a>
        </div>

        <div class="contact">
            <p>お問い合わせ: <a href="mailto:kinia.app@gmail.com">kinia.app@gmail.com</a></p>
        </div>
    </div>
</body>
</html>
