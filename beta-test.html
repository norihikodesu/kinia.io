<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XCT32M2MZV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XCT32M2MZV');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinia — Google Playで配信中</title>
    <meta http-equiv="refresh" content="5;url=https://play.google.com/store/apps/details?id=io.kinia">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Shippori+Mincho:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fbf6ef;
            --text: #2a2218;
            --bg-alt: #f4e8d8;
            --surface: #ffffff;
            --text-sub: rgba(42,34,24,0.62);
            --text-dim: rgba(42,34,24,0.4);
            --primary: #d97a5a;
            --primary-dim: #b85a3e;
            --border: rgba(42,34,24,0.08);
            --line: rgba(42,34,24,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 480px; }
        h1 { font-size: 1.6rem; margin-bottom: 16px; color: var(--primary); }
        p { color: var(--text-sub); margin-bottom: 16px; line-height: 1.7; }
        a {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 14px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 8px;
        }
        a:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="container">
    <h1>Kinia は正式公開されました</h1>
    <p>ベータテストは終了し、Google Play で一般公開中です。<br>5秒後に自動的にGoogle Playへ移動します。</p>
    <a href="https://play.google.com/store/apps/details?id=io.kinia">Google Playでインストール</a>
    <p style="margin-top:24px;"><a href="/" style="background:none; color:var(--primary); padding:0;">トップページに戻る</a></p>
</div>
