<!DOCTYPE html>
<html lang="ja">
<head>

    <script>
      window.dataLayer = window.dataLayer || [];

      gtag('config', 'G-XCT32M2MZV');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinia — Google Playで配信中</title>
    <meta http-equiv="refresh" content="5;url=https://play.google.com/store/apps/details?id=io.kinia">
    <style>
        :root {
            --bg: #12121F;
            --text: #E8E4F0;
            --text-sub: #B0AAC2;
            --primary: #7C8EF2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 480px; }
        h1 { font-size: 1.6rem; margin-bottom: 16px; color: var(--primary); }
        p { color: var(--text-sub); margin-bottom: 16px; line-height: 1.7; }
        a {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 14px 32px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 8px;
        }
        a:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="container">
    <h1>Kinia は正式公開されました</h1>
    <p>ベータテストは終了し、Google Play で一般公開中です。<br>5秒後に自動的にGoogle Playへ移動します。</p>

</div>
